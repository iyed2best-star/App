workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run Flutter analyze
        script: flutter analyze
      - name: Build for iOS
        script: flutter build ios --no-codesign
